name: APT Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg gzip

      - name: Generate signing key
        run: ./scripts/init-signing-key.sh

      - name: Build packages
        run: ./scripts/build-packages.sh

      - name: Sign repository
        run: ./scripts/sign-repository.sh

      - name: Validate local repository
        run: ./scripts/test-local-repo.sh

      - name: Validate unsigned isolated APT access
        run: ./scripts/apt-smoke-test.sh

      - name: Validate signed isolated APT access
        run: ./scripts/apt-signed-smoke-test.sh
